<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A2472" />
  <title>Offline — Vincollins College</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0A2472 0%, #1e3a8a 50%, #0A2472 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 3rem 2rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }

    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.025em;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.75;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.1);
      border-radius: 9999px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }

    .dot.online {
      background: #22c55e;
      animation: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: white;
      color: #0A2472;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 9999px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
      margin-bottom: 0.75rem;
      text-decoration: none;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .btn:active { transform: translateY(0); }

    .btn-outline {
      background: transparent;
      color: white;
      border: 1.5px solid rgba(255,255,255,0.4);
    }

    .btn-outline:hover { background: rgba(255,255,255,0.1); }

    .school-name {
      margin-top: 2rem;
      font-size: 0.75rem;
      opacity: 0.5;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #0A2472;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>

    <h1>You're Offline</h1>
    <p class="subtitle">
      Vincollins Portal requires an internet connection.<br />
      Please check your network and try again.
    </p>

    <div class="status" id="statusBar">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">No internet connection</span>
    </div>

    <button class="btn" id="reloadBtn" onclick="handleReload()">
      <div class="spinner" id="spinner"></div>
      <span id="reloadText">🔄 Try Again</span>
    </button>

    <a href="/portal" class="btn btn-outline">
      ← Back to Login
    </a>

    <p class="school-name">Vincollins College Portal</p>
  </div>

  <script>
    // Update connection status
    function updateStatus() {
      const dot = document.getElementById('statusDot')
      const text = document.getElementById('statusText')
      if (navigator.onLine) {
        dot.classList.add('online')
        text.textContent = 'Connection restored — ready to reload'
      } else {
        dot.classList.remove('online')
        text.textContent = 'No internet connection'
      }
    }

    function handleReload() {
      const btn = document.getElementById('reloadBtn')
      const spinner = document.getElementById('spinner')
      const reloadText = document.getElementById('reloadText')

      spinner.style.display = 'block'
      reloadText.textContent = 'Checking connection...'
      btn.disabled = true

      setTimeout(() => {
        window.location.reload()
      }, 800)
    }

    // Auto-reload when connection comes back
    window.addEventListener('online', () => {
      updateStatus()
      setTimeout(() => window.location.reload(), 1000)
    })

    window.addEventListener('offline', updateStatus)

    updateStatus()
  </script>
</body>
</html>
